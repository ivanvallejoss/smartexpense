services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user_dev
      - POSTGRES_PASSWORD=password_dev
      - POSTGRES_DB=smartexpense_db
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6389:6379"

volumes:
  postgres_data: